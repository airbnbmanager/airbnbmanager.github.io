<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>The UNIQUE HAVEN HOME STAY</title>
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <!-- Config -->
  <script src="config.js"></script>

  <!-- App Modules — order matters -->
  <script src="js/core.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/bookings.js"></script>
  <script src="js/properties.js"></script>
  <script src="js/team.js"></script>
  <script src="js/tasks.js"></script>
  <script src="js/attendance.js"></script>
  <script src="js/payroll.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/pnl.js"></script>
  <script src="js/repairs.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/investors.js"></script>
  <script src="js/users.js"></script>
  <script src="js/sop.js"></script>

  <!-- AUTH GUARD — sb client use karta hai (core.js wala) -->
  <script>
    window.addEventListener("load", async () => {
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (!session) {
          window.location.replace("/");
        }
      } catch (e) {
        console.warn("Auth check failed:", e);
        // Error pe redirect mat karo — login flow core.js handle karega
      }
    });
  </script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(() => console.log('✅ SW registered'))
        .catch(err => console.log('❌ SW failed:', err));
    }
  </script>
</body>
</html>
